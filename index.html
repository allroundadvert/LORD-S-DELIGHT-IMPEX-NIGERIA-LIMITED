<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LORD'S DELIGHT IMPEX NIGERIA LIMITED</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d0d0d;
  color: #fff;
}

/* HEADER */
header {
  background: linear-gradient(90deg, black, #1a1a1a);
  text-align: center;
  padding: 25px;
  border-bottom: 2px solid gold;
}

header h1 {
  color: gold;
  margin: 0;
  font-size: 26px;
}

header p {
  font-size: 14px;
  color: #ccc;
}

/* CONTAINER */
.container {
  padding: 20px;
}

/* FORM */
.form-box {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid gold;
}

.form-box input, .form-box textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  background: #000;
  color: #fff;
}

/* SECTION TITLE */
h2 {
  margin-top: 40px;
  color: gold;
  border-left: 4px solid gold;
  padding-left: 10px;
}

/* GRID */
.tiles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-top: 15px;
}

/* TILE CARD */
.tile-card {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
  border: 1px solid #333;
  transition: 0.3s;
}

.tile-card:hover {
  transform: scale(1.03);
  border-color: gold;
}

.tile-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

.tile-card p {
  margin: 10px 0;
}

/* BUTTON */
.submit-btn {
  margin-top: 30px;
  padding: 15px;
  width: 100%;
  background: gold;
  color: black;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* WHATSAPP BUTTON */
.whatsapp-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: gold;
  color: black;
  padding: 15px;
  border-radius: 50%;
  font-size: 18px;
  border: none;
  cursor: pointer;
}

/* MAP */
.map {
  margin-top: 40px;
  border: 2px solid gold;
  border-radius: 10px;
  overflow: hidden;
}
</style>
</head>

<body>

<header>
  <h1>LORD'S DELIGHT IMPEX NIGERIA LIMITED</h1>
  <p>Number 61A Ezenei Avenue, by Sovitel Hotel Junction, Asaba, Delta State</p>
</header>

<div class="container">

<form>

<!-- CUSTOMER DETAILS -->
<div class="form-box">
  <h2>Customer Details</h2>
  <input type="text" id="name" placeholder="Full Name">
  <input type="tel" id="phone" placeholder="Phone Number">
  <textarea id="spec" placeholder="Specifications (Size, Color, Quantity etc)"></textarea>
</div>

<!-- SETS -->
<h2>Set 1: Marble Tiles</h2>
<div class="tiles-grid">
  <div class="tile-card">
    <img src="https://via.placeholder.com/300x200">
    <p>Marble A</p>
    <input type="checkbox" value="Marble A">
  </div>
</div>

<h2>Set 2: Granite Tiles</h2>
<div class="tiles-grid">
  <div class="tile-card">
    <img src="https://via.placeholder.com/300x200">
    <p>Granite A</p>
    <input type="checkbox" value="Granite A">
  </div>
</div>

<h2>Set 3: Bathroom Tiles</h2>
<div class="tiles-grid">
  <div class="tile-card">
    <img src="https://via.placeholder.com/300x200">
    <p>Bathroom A</p>
    <input type="checkbox" value="Bathroom A">
  </div>
</div>

<h2>Set 4: Kitchen Tiles</h2>
<div class="tiles-grid">
  <div class="tile-card">
    <img src="https://via.placeholder.com/300x200">
    <p>Kitchen A</p>
    <input type="checkbox" value="Kitchen A">
  </div>
</div>

<h2>Set 5: Outdoor Tiles</h2>
<div class="tiles-grid">
  <div class="tile-card">
    <img src="https://via.placeholder.com/300x200">
    <p>Outdoor A</p>
    <input type="checkbox" value="Outdoor A">
  </div>
</div>

<button type="button" class="submit-btn" onclick="submitTiles()">Submit Order</button>

</form>

<!-- MAP -->
<div class="map">
  <iframe 
    src="https://maps.google.com/maps?q=Ezenei%20Avenue%20Asaba&t=&z=15&ie=UTF8&iwloc=&output=embed"
    width="100%" height="300" style="border:0;">
  </iframe>
</div>

</div>

<!-- WHATSAPP -->
<button class="whatsapp-btn" onclick="sendToWhatsApp()">💬</button>

<script>
function submitTiles() {
  let selected = [];
  document.querySelectorAll("input[type=checkbox]:checked").forEach(box => {
    selected.push(box.value);
  });

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let spec = document.getElementById("spec").value;

  if(!name || !phone){
    alert("Please fill your details");
    return;
  }

  if(selected.length === 0){
    alert("Please select tiles");
    return;
  }

  let data =
    "Name: " + name +
    "%0APhone: " + phone +
    "%0ASpecifications: " + spec +
    "%0ATiles: " + selected.join(", ");

  localStorage.setItem("order", data);
  alert("Order saved. Click WhatsApp button.");
}

function sendToWhatsApp() {
  let data = localStorage.getItem("order");

  if(!data){
    alert("No order found");
    return;
  }

  let phone = "2348032410223";
  let url = "https://wa.me/" + phone + "?text=" + data;

  window.open(url, "_blank");
}
</script>

</body>
</html>
